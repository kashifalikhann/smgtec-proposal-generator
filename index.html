<link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
:root{--bg:#0a0a0a;--bg2:#111;--bg3:#161616;--bg4:#1a1a1a;--bd:#2a2a2a;--gold:#DEDBC8;--gold2:#C4B49A;--gold3:#8a7d66;--txt:#F5F5F0;--txt2:#999;--txt3:#666;--red:#CC3333;--green:#4CAF50;--r:8px}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:Inter,sans-serif;background:var(--bg);color:var(--txt);line-height:1.6;min-height:100vh}
.serif{font-family:Instrument Serif,serif}
.hdr{border-bottom:1px solid var(--bd);padding:16px 28px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;background:var(--bg);z-index:100}
.hd{display:flex;align-items:center;gap:10px}
.hl{width:30px;height:30px;background:var(--gold);border-radius:6px;display:flex;align-items:center;justify-content:center;font-weight:700;font-size:12px;color:var(--bg)}
.ht{font-size:14px;font-weight:600}
.hs{font-size:10px;color:var(--txt3);text-transform:uppercase;letter-spacing:1px}
.ha{display:flex;gap:10px}
.seg{display:flex;background:var(--bg2);border-radius:6px;border:1px solid var(--bd);overflow:hidden}
.tb{padding:5px 11px;font-size:11px;font-weight:500;background:transparent;border:none;color:var(--txt3);cursor:pointer}
.tb.active{background:var(--gold);color:var(--bg)}
.main{display:grid;grid-template-columns:380px 1fr;min-height:calc(100vh - 60px)}
.sb{border-right:1px solid var(--bd);padding:20px 18px;overflow-y:auto;max-height:calc(100vh - 60px);background:var(--bg2)}
.fs{margin-bottom:20px}
.fst{font-size:10px;font-weight:600;text-transform:uppercase;letter-spacing:1.5px;color:var(--gold2);margin-bottom:10px}
.fg{margin-bottom:10px}
.fl{display:block;font-size:11px;font-weight:500;color:var(--txt2);margin-bottom:4px}
.fi,.fsel{width:100%;padding:8px 11px;background:var(--bg4);border:1px solid var(--bd);border-radius:var(--r);color:var(--txt);font-size:12px;font-family:inherit;outline:none}
.fi:focus,.fsel:focus{border-color:var(--gold)}
.fsel{appearance:none;background-position:right 10px center;padding-right:26px;cursor:pointer}
.fw{display:grid;grid-template-columns:1fr 1fr;gap:8px}
.fn{display:flex;align-items:center;gap:5px}
.fb{width:26px;height:30px;background:var(--bg4);border:1px solid var(--bd);border-radius:var(--r);color:var(--txt);font-size:13px;cursor:pointer}
.fv{width:44px;text-align:center;padding:6px;background:var(--bg4);border:1px solid var(--bd);border-radius:var(--r);color:var(--txt);font-size:12px;font-weight:600;outline:none}
.btn{width:100%;padding:12px;background:var(--gold);color:var(--bg);border:none;border-radius:var(--r);font-size:13px;font-weight:600;cursor:pointer;margin-top:6px}
.btn:disabled{opacity:.5;cursor:not-allowed}
.pv{padding:28px;overflow-y:auto;max-height:calc(100vh - 60px)}
.pe{display:flex;flex-direction:column;align-items:center;justify-content:center;height:350px;text-align:center;color:var(--txt3)}
.pe h3{font-size:15px;color:var(--txt2);margin-bottom:5px}
.pe p{font-size:12px;max-width:240px}
.pr{display:none;max-width:760px;margin:0 auto}
.pr.v{display:block}
.pp{background:#fff;color:#1a1a1a;border-radius:var(--r);overflow:hidden;margin-bottom:18px;box-shadow:0 3px 16px rgba(0,0,0,.25)}
.pp-cover{background:#0a0a0a;color:#DEDBC8;padding:60px 40px;text-align:center}
.pp-logo{font-weight:700;font-size:13px;letter-spacing:3px;text-transform:uppercase;margin-bottom:28px;color:var(--gold2)}
.pp-title{font-family:Instrument Serif,serif;font-size:30px;font-weight:400;margin-bottom:6px;color:#fff}
.pp-sub{font-size:12px;color:#999;margin-bottom:28px}
.pp-client{font-size:12px;color:#DEDBC8;margin-bottom:4px}
.pp-valid{font-size:10px;color:#666;margin-top:12px}
.pp-body{padding:40px}
.pp-body h2{font-family:Instrument Serif,serif;font-size:22px;color:#0a0a0a;margin-bottom:16px;padding-bottom:8px;border-bottom:2px solid #DEDBC8}
.executive-summary{background:#f8f7f4;border-left:4px solid #DEDBC8;padding:16px 20px;border-radius:0 var(--r) var(--r) 0;margin-bottom:24px}
.executive-summary p{font-size:11px;color:#444;line-height:1.7}
.risk-box{background:#fef2f2;border:1px solid #fecaca;border-radius:var(--r);padding:16px 20px;margin-bottom:24px}
.risk-box h4{font-size:11px;font-weight:600;color:#991b1b;margin-bottom:8px}
.risk-box ul{list-style:none;padding:0}
.risk-box li{font-size:10px;color:#7f1d1d;padding:3px 0;padding-left:12px;position:relative}
.risk-box li::before{content:"→";position:absolute;left:0;color:#dc2626}
.tier-cards{display:grid;grid-template-columns:repeat(3,1fr);gap:12px;margin-bottom:24px}
.tcard{border:2px solid #e5e5e5;border-radius:var(--r);padding:20px;position:relative}
.tcard.recommended{border-color:#DEDBC8;background:#faf9f6}
.tcard-name{font-family:Instrument Serif,serif;font-size:16px;color:#0a0a0a;margin-bottom:2px}
.tcard-price{margin-bottom:12px}
.tcard-price-amount{font-size:22px;font-weight:700;color:#0a0a0a}
.tcard-price-period{font-size:10px;color:#888}
.tcard-features{list-style:none;padding:0}
.tcard-features li{font-size:10px;color:#444;padding:3px 0;padding-left:16px;position:relative}
.tcard-features li.included::before{content:"✓";position:absolute;left:0;color:#4CAF50;font-weight:700}
.ib{display:none;max-width:760px;margin:0 auto}
.ib.v{display:block}
@media print{.hdr,.sb{display:none!important}.main{display:block}.pv{padding:0;max-height:calc(100vh - 60px);overflow:visible}.pp{box-shadow:none;border-radius:0;page-break-after:always}.ib{display:none!important}}
@media(max-width:900px){.main{grid-template-columns:1fr}.sb{border-right:none;border-bottom:1px solid var(--bd);max-height:none}.tc{grid-template-columns:1fr}.ro{grid-template-columns:1fr}}
</style>
</head>
<body>
<noscript><iframe src="https://www.googletagmanager.com/ns.html?id=GTM-NH9SQDQM" height="0" width="0" style="display:none;visibility:hidden"></iframe></noscript>

<header class="hdr">
  <div class="hd"><div class="hl">SM</div><div><div class="ht">SMGTEC Proposal Generator</div></div></div>
  <div class="ha">
    <div class="seg lg"><button class="tb active" onclick="setLang('en')">EN</button><button class="tb" onclick="setLang('es')">ES</button></div>
    <div class="seg"><button class="tb active" onclick="setMode('client')" id="mC">Client</button><button class="tb" onclick="setMode('internal')" id="mI">Internal</button></div>
  </div>
</header>

<div class="main">
<aside class="sb">
  <div class="fs"><div class="fst" id="l_company">Company Info</div>
    <div class="fg"><label class="fl" id="l_co">Company Name</label><input class="fi" id="f_co" value="N&amp;B Legal"></div>
    <div class="fg"><label class="fl" id="l_ct">Contact</label><input class="fi" id="f_ct" value="Syed Zeeshan Rizvi"></div>
    <div class="fg"><label class="fl" id="l_em">Email</label><input class="fi" id="f_em" value="" placeholder="client@example.com"></div>
    <div class="fg"><label class="fl" id="l_web">Website</label><input class="fi" id="f_web" value="" placeholder="example.com"></div>
    <div class="fg"><label class="fl" id="l_ind">Industry</label>
      <select class="fsel" id="f_ind"><option value="legal" selected>Legal</option><option value="healthcare">Healthcare</option><option value="finance">Finance</option><option value="other">Other</option></select>
    </div>
    <div class="fg"><label class="fl" id="l_state">Current IT State</label><textarea class="fi" id="f_state" rows="2" placeholder="e.g. single computer, no backup" style="resize:vertical;min-height:50px"></textarea></div>
  </div>
  <div class="fs"><div class="fst" id="l_infra">Infrastructure</div>
    <div class="fw">
      <div class="fg"><label class="fl" id="l_ws">Workstations</label>
        <div class="fn"><button class="fb" onclick="adj('v_ws',-1)">−</button><input class="fv" id="v_ws" value="10"><button class="fb" onclick="adj('v_ws',1)">+</button></div>
      </div>
      <div class="fg"><label class="fl" id="l_lp">Laptops</label>
        <div class="fn"><button class="fb" onclick="adj('v_lp',-1)">−</button><input class="fv" id="v_lp" value="0"><button class="fb" onclick="adj('v_lp',1)">+</button></div>
      </div>
    </div>
    <div class="fw">
      <div class="fg"><label class="fl" id="l_sv">Servers</label>
        <div class="fn"><button class="fb" onclick="adj('v_sv',-1)">−</button><input class="fv" id="v_sv" value="0"><button class="fb" onclick="adj('v_sv',1)">+</button></div>
      </div>
      <div class="fg"><label class="fl" id="l_bud">Budget</label>
        <select class="fsel" id="f_bud"><option value="tight">&lt;€500/mo</option><option value="moderate" selected>€500-1000</option><option value="flexible">&gt;€1000</option></select>
      </div>
    </div>
  </div>
  <button class="btn" onclick="gen()" id="bG">Generate</button>
</aside>
<main class="pv">
  <div class="pe" id="eS"><h3 id="txt_et">No proposal yet</h3><p id="txt_ed">Fill in and click Generate.</p></div>
  <div class="pr" id="pr"></div>
  <div class="ib" id="ib"></div>
</main>
</div>

<script>
// SMGTEC Proposal Generator v2.0 — Complete Engine
// All element IDs MUST match the HTML. No exceptions.

var LANG = 'en';

// Pricing — our cost / client sell price
var P = {
  m365:   {c:18.70, s:22.50},
  drop:   {c: 3.00, s: 4.50},
  msp:    {c: 5.00, s: 8.33},
  b2:     10,  // fixed monthly
  forti:  {c: 735, s: 1290},  // 60F hardware
  utp:    503,  // UTP license 1yr
  rmm:    20,   // solarwinds allocation
  s1:     {c: 2.50, s: 5.00},
  dell:   {c: 800, s: 1200},
  datto:  {c:1500, s: 2400},
  apc:    {c: 200, s: 350},
  voip:   {c: 12, s: 20},
  labor:  20    // hourly rate
};

// I18N translations
var T = {
  en: {
    company:'Company Information', co:'Company Name', web:'Website (optional)', ct:'Contact Name',
    ind:'Industry', infra:'IT Infrastructure', ws:'Workstations', lp:'Laptops', sv:'Servers',
    bud:'Budget Range', state:'Current IT State', em:'Email', bk:'Backup',
    gen:'Generate Proposal', generating:'Generating...',
    empty_t:'No pr yet', empty_d:'Fill in details and click Generate.',
    l1:'M365 Business Premium — email, MFA, Conditional Access, Azure AD P1, OneDrive, Defender',
    l2:'MSP360 cloud backup — encrypted, off-site, ransomware-proof',
    l3:'Email backup (Dropsuite) — all mailboxes, 1-year retention',
    l4:'Data Processing Agreement (DPA) + LOPGDG protocol',
    l5:'Cyber liability insurance (€2M coverage)',
    l6:'Client portal + monthly report',
    l7:'Remote helpdesk (business hours)',
    l8:'FortiGate 60F Firewall — AI threat intel, IPS, VLAN, VPN, guest Wi-Fi',
    l9:'SolarWinds 24/7 RMM — auto patching, daily security checks',
    l10:'Quarterly Business Review + Continual Improvement Register',
    l11:'Dell T150 Server — RAID-1, centralized files, TrueNAS, per-user access',
    l12:'Datto SIRIS 5 (2TB SSD) — instant cloud virtualization, screenshot verification',
    l13:'APC UPS 1500VA — 30min runtime, graceful shutdown',
    l14:'SentinelOne Complete — AI EDR, zero-day detection, ransomware <1 second',
    l15:'Annual compliance review — DPO advisory, LOPGDG gap analysis',
    t1n:'Essential', t1t:'Sleep at night',
    t2n:'Professional', t2t:'Sleep well',
    t3n:'Enterprise', t3t:'Zero worries',
    prepared:'Prepared for',
    otime:'One-time', pmonth:'/month'
  },
  es: {
    company:'Información Empresa', co:'Nombre', web:'Sitio Web', ct:'Contacto',
    ind:'Industria', infra:'Infraestructura IT', ws:'Ordenadores', lp:'Portátiles', sv:'Servidores',
    bud:'Presupuesto', state:'Estado Actual', em:'Email', bk:'Backup',
    gen:'Generar Propuesta', generating:'Generando...',
    empty_t:'Sin propuesta', empty_d:'Complete los datos.',
    l1:'M365 BP — email, MFA, Conditional Access, Defender',
    l2:'Backup MSP360 — cifrado, externo',
    l3:'Backup email (Dropsuite)',
    l4:'Acuerdo DPA + LOPGDG',
    l5:'Seguro cibernético (€2M)',
    l6:'Portal cliente + informe',
    l7:'Helpdesk remoto',
    l8:'FortiGate 60F — IA, IPS, VLAN, VPN',
    l9:'SolarWinds 24/7 RMM — parches automáticos',
    l10:'Revisión Trimestral + Mejora Continua',
    l11:'Servidor Dell T150 — RAID-1, centralizado',
    l12:'Datto SIRIS 5 — virtualización instantánea',
    l13:'APC UPS 1500VA — 30min',
    l14:'SentinelOne — EDR IA, zero-day',
    l15:'Revisión cumplimiento anual',
    t1n:'Esencial', t1t:'Duerme tranq.',
    t2n:'Profesional', t2t:'Duerme bien',
    t3n:'Empresarial', t3t:'Cero preocup.',
    prepared:'Preparado para',
    otime:'Pago único', pmonth:'/mes'
  }
};

var LG = function(k) { return T[LANG][k] || k; };

// Switch language
function setLang(l) {
  LANG = l;
  // Toggle button visual state
  document.querySelector('.seg.lg').children[0].classList.toggle('active', l === 'en');
  document.querySelector('.seg.lg').children[1].classList.toggle('active', l === 'es');
  // Update all labels
  var ids = {
    l_co:'co', l_ct:'ct', l_em:'em', l_web:'web', l_ind:'ind', l_state:'state',
    l_ws:'ws', l_lp:'lp', l_sv:'sv', l_bud:'bud',
    bG:'gen', txt_et:'empty_t', txt_ed:'empty_d',
    l_company:'company', l_infra:'infra'
  };
  for (var id in ids) {
    var el = document.getElementById(id);
    if (el) el.textContent = LG(ids[id]);
  }
}

// Switch mode (client/internal)
function setMode(m) {
  document.getElementById('mC').classList.toggle('active', m === 'client');
  document.getElementById('mI').classList.toggle('active', m === 'internal');
  document.getElementById('pr').style.display = m === 'client' ? '' : 'none';
  document.getElementById('ib').style.display = m === 'internal' ? '' : 'none';
  if (m === 'client') document.getElementById('ib').innerHTML = '';
}

// Number input adjust
function adj(id, d) {
  var el = document.getElementById(id);
  el.value = Math.max(0, (parseInt(el.value) || 0) + d);
}

// CALCULATE
function calc() {
  var u = (parseInt(document.getElementById('v_ws').value) || 0)
        + (parseInt(document.getElementById('v_lp').value) || 0);
  var dev = u + (parseInt(document.getElementById('v_sv').value) || 0);
  var eps = dev;
  var rules = (function(){
    var ind = {legal:['Client confidentiality — €10M LOPGDG fines','Email evidence must be backed up','Unauthorized access liability'],healthcare:['Patient data — strict confidentiality','Medical records 5+ years','Criminal liability'],finance:['NIS2 compliance required','Transaction audit trails','Enhanced protection'],retail:['PCI-DSS payment data','Consent management','Uptime critical'],other:['LOPDGDG compliance','Professional liability','Reputational risk']};
    var k = document.getElementById('f_ind').value;
    return {risks:ind[k]||ind.other};
  })();

  // Tier 1 — Essential
  var t1mo = (P.m365.s * u) + (P.msp.s * dev) + P.b2 + (P.drop.s * u) + (P.labor * 3);
  var t1ot = 299; // setup fee
  var t1cm = (P.m365.c * u) + (P.msp.c * dev) + P.b2 + (P.drop.c * u) + (P.labor * 3);
  var t1ct = 120;

  // Tier 2 — Professional (cumulative)
  var fortiMo = P.utp / 12;
  var t2mo = t1mo + fortiMo + P.rmm + (P.labor * 2);
  var t2ot = t1ot + P.forti.s;
  var t2cm = t1cm + fortiMo + P.rmm + (P.labor * 2);
  var t2ct = t1ct + P.forti.c;

  // Tier 3 — Enterprise (cumulative)
  var s1mo = P.s1.s * eps, s1mc = P.s1.c * eps;
  var t3mo = t2mo + s1mo + 300;
  var t3ot = t2ot + P.dell.s + P.datto.s + P.apc.s + 1000;
  var t3cm = t2cm + s1mc + (P.labor * 3);
  var t3ct = t2ct + P.dell.c + P.datto.c + P.apc.c + 800;

  [t1mo,t2mo,t3mo,t2ot,t3ot,t1cm,t2cm,t3cm,t1ct,t2ct,t3ct].forEach(function(v,i,a){
    var target=[t1mo,t2mo,t3mo,t2ot,t3ot,t1cm,t2cm,t3cm,t1ct,t2ct,t3ct];
    target[i]=Math.round(v);
    // reassign to keep variables in sync
    t1mo=target[0];t2mo=target[1];t3mo=target[2];t2ot=target[3];t3ot=target[4];
    t1cm=target[5];t2cm=target[6];t3cm=target[7];t1ct=target[8];t2ct=target[9];t3ct=target[10];
  });

  function td(mo,ot,cm,ct){
    var yr=ot+mo*12, yc=ct+cm*12, p=yr-yc, m=yr>0?Math.round(p/yr*100):0;
    return{mo:mo,ot:ot,cm:cm,ct:ct,yr:yr,yc:yc,p:p,m:m};
  }

  return {
    t1:td(t1mo,t1ot,t1cm,t1ct),
    t2:td(t2mo,t2ot,t2cm,t2ct),
    t3:td(t3mo,t3ot,t3cm,t3ct),
    u:u, dev:dev, rules:rules
  };
}

// GENERATE PROPOSAL
function gen() {
  var btn = document.getElementById('bG');
  btn.disabled = true;
  btn.textContent = LG('generating');

  setTimeout(function() {
    var d = calc();
    var isES = LANG === 'es';
    var co = document.getElementById('f_co').value || 'Client';
    var ct_txt = document.getElementById('f_ct').value;
    var em_txt = document.getElementById('f_em').value;
    var web_txt = document.getElementById('f_web').value;
    var state_txt = document.getElementById('f_state').value;
    var rec = document.getElementById('f_bud').value === 'flexible' ? 3 : document.getElementById('f_bud').value === 'tight' ? 1 : 2;

    var cp = document.getElementById('pr');
    cp.innerHTML = '';
    document.getElementById('eS').style.display = 'none';
    document.getElementById('ib').innerHTML = '';

    // Helper: append a pr page
    function page(html) {
      var div = document.createElement('div');
      div.className = 'pp';
      div.innerHTML = html;
      cp.appendChild(div);
    }

    // ═══ PAGE 1: COVER ═══
    page('<div class="pp-cover">' +
      '<div class="pp-logo">SMGTEC SL</div>' +
      '<h1 class="pp-title">' + (isES ? 'Propuesta de Infraestructura' : 'Infrastructure Proposal') + '</h1>' +
      '<div class="pp-sub">Data Protection + Security + Compliance</div>' +
      '<div class="pp-client"><strong>' + LG('prepared') + ':</strong> ' + co + '</div>' +
      (ct_txt ? '<div class="pp-client" style="font-size:11px;color:#999">' + ct_txt + (em_txt ? ' · ' + em_txt : '') + (web_txt ? ' · ' + web_txt : '') + '</div>' : '') +
      '<div class="pp-valid">' + new Date().toLocaleDateString(isES ? 'es-ES' : 'en-GB') + '</div>' +
    '</div>');

    // ═══ PAGE 2: EXECUTIVE SUMMARY ═══
    page('<div class="pp-body">' +
      '<div class="executive-summary">' +
      '<p>' + (isES ? 'Basado en su situación actual, hemos diseñado tres niveles de protección para ' + co + '.' : 'Based on your current setup, we have designed three protection tiers for ' + co + '.') + '</p>' +
      (state_txt ? '<p style="margin-top:10px;font-size:11px;color:#666;"><strong>' + (isES ? 'Situación actual:' : 'Current setup:') + '</strong> ' + state_txt + '</p>' : '') +
      '</div>' +

      // Risk Box
      '<div class="risk-box">' +
      '<h4 style="font-size:13px;font-weight:600;color:#991b1b;margin-bottom:8px;">' + (isES ? '⚠️ Riesgos Actuales' : '⚠️ Current Risks') + '</h4>' +
      '<ul style="list-style:none;padding:0;">' +
      d.rules.risks.map(function(r){ return '<li style="font-size:12px;color:#7f1d1d;padding:3px 0;padding-left:16px;position:relative;"><span style="position:absolute;left:0;color:#dc2626;">→</span>'+r+'</li>'; }).join('') +
      '<li style="font-size:12px;color:#7f1d1d;padding:3px 0;padding-left:16px;position:relative;"><span style="position:absolute;left:0;color:#dc2626;">→</span>' + (isES ? 'Multas LOPGDG: hasta €10M' : 'LOPDGDG fines: up to €10M') + '</li>' +
      '</ul></div>' +
    '</div>');

    // ═══ PAGE 3: TIER CARDS (SEPARATE features per tier) ═══
    var feat1 = [LG('l1'),LG('l2'),LG('l3'),LG('l4'),LG('l5'),LG('l6'),LG('l7')];
    var feat2 = feat1.concat([LG('l8'),LG('l9'),LG('l10')]);
    var feat3 = feat2.concat([LG('l11'),LG('l12'),LG('l13'),LG('l14'),LG('l15')]);

    page('<div class="pp-body">' +
      '<h2 style="font-family:\'Instrument Serif\',serif;font-size:22px;color:#0a0a0a;margin-bottom:16px;padding-bottom:8px;border-bottom:2px solid #DEDBC8;">' + (isES ? 'Tres Niveles de Protección' : 'Three Protection Tiers') + '</h2>' +
      '<div class="tier-cards">' +

      // Tier 1
      '<div class="tcard' + (1===rec?' recommended':'') + '">' +
